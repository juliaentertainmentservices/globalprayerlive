<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Prayer Live — 24/7 Broadcast</title>
<meta name="viewport" content="width=1920, initial-scale=1">
<meta name="description" content="World Prayer Live — sample broadcast screen, Phase 1 prototype.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage" id="stage">

  <!-- Ambient background -->
  <div class="bg">
    <svg class="arch" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
      <path d="M960,120 C700,120 560,320 560,560 L560,1080 L1360,1080 L1360,560 C1360,320 1220,120 960,120 Z"/>
    </svg>
    <div class="stars" id="stars"></div>
  </div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">☾</span>
      <span class="brand-name">World Prayer Live</span>
    </div>
    <div class="live-badge"><span class="dot"></span>LIVE · 24/7</div>
  </header>

  <!-- Sample-data disclaimer (Phase 1 requirement) -->
  <div class="sample-banner">SAMPLE PRAYER TIMES — FOR LAYOUT TESTING ONLY, NOT FOR RELIGIOUS USE</div>

  <!-- Main content -->
  <main class="content">

    <section class="city-panel">
      <div class="flag" id="flag">🕋</div>
      <h1 class="city-name" id="cityName">Makkah</h1>
      <div class="country-name" id="countryName">Saudi Arabia</div>

      <div class="clock-block">
        <div class="clock" id="clock">00:00:00</div>
        <div class="date" id="date">—</div>
      </div>

      <div class="city-progress" id="cityProgress">
        <div class="city-progress-fill" id="cityProgressFill"></div>
      </div>
    </section>

    <section class="prayer-panel">
      <div class="prayer-panel-title">Today's Schedule</div>
      <ul class="prayer-list" id="prayerList"></ul>
    </section>

  </main>

  <!-- Bottom countdown bar -->
  <footer class="countdown-bar">
    <div class="countdown-label">
      <span class="countdown-eyebrow">Next Prayer</span>
      <span class="countdown-name" id="nextPrayerName">Fajr</span>
    </div>
    <div class="countdown-timer" id="countdownTimer">00:00:00</div>
    <div class="current-prayer">
      <span class="countdown-eyebrow">Current</span>
      <span class="countdown-name" id="currentPrayerName">—</span>
    </div>
  </footer>

  <!-- Fallback scene, shown only if data fails to load -->
  <div class="fallback" id="fallback">
    <div class="fallback-inner">
      <div class="brand-mark" style="font-size:64px;">☾</div>
      <h2>World Prayer Live</h2>
      <p>Broadcast returning shortly.</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
